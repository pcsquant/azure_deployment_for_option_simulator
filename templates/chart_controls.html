<div class="chart-popup-header">
    <h2>Future Chart</h2>

    <select id="futureMonthSelect">
        <option value="current">This Month</option>
        <option value="next">Next Month</option>
        <option value="next_to_next">Next To Next Month</option>
    </select>

    <input type="date" id="futureChartStartDate">
    <input type="time" id="futureChartStartTime" value="09:15">
    <input type="date" id="futureChartEndDate">
    <input type="time" id="futureChartEndTime" value="15:30">

    <select id="futureChartInterval">
        <option value="1">1m</option>
        <option value="2">2m</option>
        <option value="3" selected>3m</option>
        <option value="5">5m</option>
        <option value="10">10m</option>
        <option value="15">15m</option>
        <option value="30">30m</option>
        <option value="60">1h</option>
    </select>

    <button
        type="button"
        id="futureChartApplyBtn"
        class="chart-apply-btn">
        Apply
    </button>

    <button id="closeFutureChartPopup" type="button">&times;</button>
</div>
