services:
  options-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: options-simulator:latest
    container_name: options_simulator_flask

    ports:
      - "8000:8000"

    environment:
      HOST: 0.0.0.0
      PORT: 8000
      PARQUET_BASE_PATH: /app/data
      OPTION_PARQUET_BASE_PATH: /app/data
      SHARED_OPTION_CACHE_DIR: /app/shared_cache/option_chain
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: INFO

    volumes:
      - type: bind
        source: C:/Users/admin/Documents/shamil/agent/weekely_data
        target: /app/data
        read_only: true
      - option_chain_cache:/app/shared_cache

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  option_chain_cache: